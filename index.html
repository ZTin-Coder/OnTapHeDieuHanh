<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Hệ Điều Hành</title>
    <style>
        :root {
            --bg-start: #fdeff9;
            --bg-end: #e7f5ff;
            --card: rgba(255, 255, 255, 0.95);
            --text: #1f2937;
            --primary: #5b5fd3;
            --secondary: #f85e7f;
            --accent: #34c1a8;
            --shadow: 0 18px 35px rgba(83, 80, 153, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(248, 94, 127, 0.15), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(82, 144, 255, 0.14), transparent 20%),
                        linear-gradient(180deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            line-height: 1.7;
            padding: 24px;
        }

        .page-shell {
            max-width: 1000px;
            margin: auto;
            padding: 8px;
        }

        .page-header {
            text-align: center;
            padding: 24px 18px 16px;
            margin-bottom: 16px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .page-header h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 3.2rem);
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #f95f80, #665dff, #39c8e6);
            -webkit-background-clip: text;
            color: transparent;
        }

        .page-header p {
            margin: 12px auto 0;
            max-width: 720px;
            color: #4d5766;
            font-size: 1.05rem;
        }

        #dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,255,255,0.84));
            padding: 18px 22px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow);
            position: sticky;
            top: 16px;
            z-index: 100;
        }

        #score-display {
            margin: 0;
            padding: 12px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(91,95,211,0.15), rgba(52,193,168,0.12));
            color: #2d2d48;
            font-size: 1.15rem;
            font-weight: 700;
        }

        #dashboard button {
            margin: 0;
        }

        button {
            appearance: none;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
            box-shadow: 0 14px 30px rgba(83, 80, 153, 0.14);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(83, 80, 153, 0.18);
        }

        button:active {
            transform: translateY(0);
        }

        #submit-btn {
            background: var(--accent);
            width: 230px;
            display: none;
            margin: 28px auto 0;
        }

        #next-quiz-btn {
            background: #f1ac3e;
            color: #2c2c2c;
        }

        #next-quiz-btn:hover {
            background: #ffa751;
        }

        #history-btn {
            background: #8b5cf6;
        }

        #history-btn:hover {
            background: #7c3aed;
        }

        .question-card {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 24px;
            margin-top: 20px;
            border-radius: 22px;
            box-shadow: 0 16px 40px rgba(49, 81, 162, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .question-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(83, 93, 255, 0.14), transparent 36%),
                        radial-gradient(circle at bottom left, rgba(52, 193, 168, 0.12), transparent 28%);
            pointer-events: none;
        }

        .question-card h3 {
            margin-top: 0;
            color: #2b2b3d;
            font-size: 1.18rem;
        }

        .question-meta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            color: #5f6a8b;
            font-size: 0.95rem;
        }

        .question-meta span {
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(91, 95, 211, 0.08);
            color: #3d3d6c;
            font-weight: 600;
        }

        .options {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid rgba(90, 100, 180, 0.18);
            transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
            background: rgba(249, 249, 255, 0.85);
        }

        .options label:hover {
            background: rgba(254, 239, 255, 0.95);
            transform: translateY(-1px);
        }

        .options input {
            width: 18px;
            height: 18px;
            accent-color: var(--secondary);
        }

        .correct-ans {
            background-color: #e6f7ed !important;
            border-color: #8cd6a3 !important;
        }

        .wrong-ans {
            background-color: #ffe9e7 !important;
            border-color: #ffb5ac !important;
        }

        #history-modal {
            display: none;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        #history-modal h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
        }

        #history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #history-list li {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(141, 148, 195, 0.18);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: rgba(248, 249, 255, 0.95);
            font-weight: 600;
        }

        .corner-logo {
            position: fixed;
            bottom: 18px;
            right: 18px;
            width: 60px;
            max-width: 18vw;
            max-height: 140px;
            opacity: 0.95;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 18px 40px rgba(83, 80, 153, 0.18);
            background: rgba(255,255,255,0.7);
            padding: 10px;
            z-index: 120;
            pointer-events: none;
        }

        @media (max-width: 1024px) { /* tablet / iPad */
            .page-shell { padding: 8px; }
            .page-header { padding: 20px; border-radius: 18px; }
            .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); }
            .question-card { padding: 20px; border-radius: 18px; }
            .corner-logo { width: 100px; max-height: 120px; bottom: 16px; right: 16px; }
            button { padding: 11px 18px; font-size: 0.98rem; }
        }

        @media (max-width: 700px) { /* phones */
            body { padding: 12px; }
            .page-shell { padding: 6px; }
            .page-header { padding: 16px 12px; border-radius: 14px; }
            .page-header h1 { font-size: 1.6rem; }
            .page-header p { font-size: 0.95rem; }
            #dashboard { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
            #score-display { align-self: start; }
            .question-card { padding: 14px; border-radius: 14px; }
            .options label { padding: 12px; gap: 12px; font-size: 0.98rem; }
            .options input { width: 16px; height: 16px; }
            button { width: 100%; padding: 12px; font-size: 1rem; }
            #submit-btn { width: 100%; margin-top: 16px; }
            .corner-logo { right: 12px; bottom: 12px; width: 80px; max-height: 80px; padding: 8px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="page-header">
            <h1>Ngân hàng Ôn thi Hệ Điều Hành</h1>
            <p>Chuẩn bị sẵn sàng để làm bài kiểm tra, chấm điểm nhanh và xem lịch sử kết quả.</p>
        </section>

        <div id="dashboard">
            <h2 id="score-display">Điểm: --/40</h2>
            <div>
                <button id="next-quiz-btn" style="display: none;">Đổi bộ đề khác</button>
                <button id="history-btn">Lịch sử làm bài</button>
            </div>
        </div>

        <div id="history-modal">
            <h2>Lịch sử các bộ đề đã làm</h2>
            <ul id="history-list"></ul>
            <button id="close-history-btn" style="background:#7f8c8d; margin-top:10px;">Đóng</button>
        </div>

        <div id="quiz-container">
            <p id="loading-msg" style="text-align: center;">Đang tải dữ liệu câu hỏi...</p>
        </div>

        <button id="submit-btn">Nộp bài & Chấm điểm</button>

        <img class="corner-logo" src="./DATA/ztis-logo.png" alt="ZTis Logo">
    </div>

    <script>
        let questionBank = []; // Mảng rỗng chờ nhận dữ liệu
        let currentQuiz = [];
        let history = [];
        let isSubmitted = false;

        // 1. Dùng fetch để nạp dữ liệu từ file JSON
        fetch('cauhoi.json')
            .then(response => {
                if (!response.ok) throw new Error("Không thể tải file JSON");
                return response.json();
            })
            .then(data => {
                questionBank = data;
                document.getElementById('loading-msg').style.display = 'none';
                generateRandomQuiz(); // Bắt đầu tạo đề khi đã có dữ liệu
            })
            .catch(error => {
                document.getElementById('loading-msg').innerText = "Lỗi tải dữ liệu: Bạn cần chạy trang web qua Local Server (Live Server) để đọc file JSON.";
                console.error(error);
            });

        // Xáo trộn và lấy 40 câu
        function generateRandomQuiz() {
            if (questionBank.length === 0) return;
            
            // Nếu ngân hàng ít hơn 40 câu thì lấy tất cả, nếu nhiều hơn thì cắt lấy 40
            let maxQuestions = questionBank.length < 40 ? questionBank.length : 40;
            
            let shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            currentQuiz = shuffled.slice(0, maxQuestions);
            renderQuiz();
            isSubmitted = false;
            document.getElementById('score-display').innerText = `Điểm: --/${maxQuestions}`;
            document.getElementById('next-quiz-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // Render ra HTML
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = ''; 

            currentQuiz.forEach((q, index) => {
                let div = document.createElement('div');
                div.className = 'question-card';
                div.id = `q-card-${index}`;
                
                let html = `<h3>Câu ${index + 1}: ${q.question}</h3><div class="options">`;
                
                q.options.forEach((opt, i) => {
                    html += `
                        <label id="label-${index}-${i}">
                            <input type="radio" name="question${index}" value="${i}">
                            ${opt}
                        </label>
                    `;
                });
                
                html += `</div>`;
                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        // Chấm điểm
        function calculateScore() {
            if(isSubmitted) return;
            
            let score = 0;
            let unAnswered = 0;
            let total = currentQuiz.length;

            currentQuiz.forEach((q, index) => {
                let selected = document.querySelector(`input[name="question${index}"]:checked`);
                let correctLabel = document.getElementById(`label-${index}-${q.answer}`);
                
                correctLabel.classList.add('correct-ans');

                if (selected) {
                    let selVal = parseInt(selected.value);
                    if (selVal === q.answer) {
                        score++;
                    } else {
                        let wrongLabel = document.getElementById(`label-${index}-${selVal}`);
                        wrongLabel.classList.add('wrong-ans');
                    }
                } else {
                    unAnswered++;
                }
                
                let radios = document.querySelectorAll(`input[name="question${index}"]`);
                radios.forEach(r => r.disabled = true);
            });

            if(unAnswered > 0) {
                alert(`Bạn còn ${unAnswered} câu chưa làm. Hệ thống vẫn tiến hành chấm điểm.`);
            }

            document.getElementById('score-display').innerText = `Điểm: ${score}/${total}`;
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-quiz-btn').style.display = 'inline-block';
            isSubmitted = true;

            let now = new Date();
            let dateString = now.toLocaleDateString('vi-VN') + " " + now.toLocaleTimeString('vi-VN');
            history.push({ date: dateString, score: score, total: total });
            updateHistoryUI();
            
            window.scrollTo(0, 0);
        }

        // Lịch sử
        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            history.forEach((h, i) => {
                let li = document.createElement('li');
                li.innerHTML = `<span>Đề số ${i + 1} (${h.date})</span> <strong>${h.score}/${h.total} điểm</strong>`;
                list.appendChild(li);
            });
        }

        // Events
        document.getElementById('submit-btn').addEventListener('click', calculateScore);
        document.getElementById('next-quiz-btn').addEventListener('click', generateRandomQuiz);
        document.getElementById('history-btn').addEventListener('click', () => { document.getElementById('history-modal').style.display = 'block'; });
        document.getElementById('close-history-btn').addEventListener('click', () => { document.getElementById('history-modal').style.display = 'none'; });
    </script>
</body>
</html>
